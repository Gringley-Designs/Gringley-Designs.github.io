        .container {
    max-width: 300px;
    max-height: 45px;
    margin: 4px auto;
    padding: 3px;
    background-color: #aafc1c; /* Semi-transparent background */
    border: 9px solid #97ed00;
    border-radius: 75px;
    outline: 6px solid #02d10c;
    display: flex;
    align-items: center; /* Vertically centers the content */
    justify-content: center; /* Horizontally centers the content */
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s forwards;
}
        .container2 {
    max-width: 80px;

    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s forwards;
}

        .containerbig {
    position: fixed;
    bottom: 5px;
    left: 0;
    right: 0;
    justify-content: center; /* Centers the content horizontally */

    max-height: 21px;
    margin: 6px auto;
    padding: 6px;

    display: flex; /* Items side-by-side */
    flex-direction: row;/* display: flex; flex-direction: column; */ /* Items stacked vertically */
    gap: 10px; /* Space between items */
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s forwards;
}
        
.container p, .container span {
    margin: 0; /* Remove default margins */

nav {
  font-family: monospace;
}

ul {
  background: white;
  list-style: none;
  margin: 0;
  padding-left: 0;
}

li {
  color: #f9ab12;
  background: #ffffff;
  display: block;
  float: left; /* This should be changed */
  padding: 1rem;
  position: relative;
  text-decoration: none;
  transition-duration: 0.5s;
}

li a {
  color: #f9ab12;
}

li:hover {
  background: white;
  cursor: pointer;
}

ul li ul {
  background: white;
  visibility: hidden;
  opacity: 0;
  min-width: 5rem;
  position: absolute;
  transition: all 0.5s ease;
  margin-top: 0;
  left: 0;
  display: none;
    z-index: 20;
}

ul li:hover > ul,
ul li:focus-within > ul,
ul li ul:hover {
  visibility: visible;
  opacity: 1;
  display: block;
}

ul li ul li {
  clear: both;
  width: 100%;
}

li:focus-within a {
  outline: none;
}

        nav ul {
    width: 100%; /* Ensures the menu takes the full width */
    display: flex; /* Use flexbox for layout */
    justify-content: space-around; /* Distributes items evenly */
     border-bottom: 4px solid #f9ab12; /* Adjust thickness and color as needed */
}

@font-face {
  font-family: "Exo Bold";
  src: url('/exo/Exo-Bold.otf');
  src: url('/exo/Exo-Bold.otf') format('otf');
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.outlined-text {
  -webkit-text-stroke-width: 2px;
  -webkit-text-stroke-color: #c90270;
  text-stroke-width: 2px; 
  text-stroke-color: #c90270;
}

        .pulse {
  animation: glow-pulse 1.5s ease-in-out infinite alternate;
}

@keyframes glow-pulse {
  from {
    text-shadow: 0 0 10px #fff, 0 0 20px #ff4da6;
  }
  to {
    text-shadow: 0 0 20px #fff, 0 0 40px #ff4da6;
  }
}
